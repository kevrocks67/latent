---
# .golangci.yml
version: "2"

run:
  timeout: 5m
  tests: true

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
    settings:
      shadow:
        strict: true

  revive:
    rules:
      - name: empty-block
      - name: empty-lines
      - name: import-shadowing
      - name: unused-receiver
      - name: use-any
      - name: use-errors-new
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: var-naming

  gosec:
    excludes:
      - G404

linters:
  default: none

  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - bodyclose
    - rowserrcheck
    - asasalint
    - gosec
    - unconvert
    - unused
    - goconst

  exclusions:
    warn-unused: true
    rules:
      - text: "unused-parameter:"
        linters:
          - revive

      - path: _test\.go
        linters:
          - goconst

      - text: '^shadow: declaration of "(err|ok)" shadows declaration'
        linters:
          - govet

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
