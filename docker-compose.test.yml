---
services:
  latent-db:
    image: postgres:18-alpine
    container_name: latent-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: latent
    volumes:
      # Mounts your schema file into the automated initialization directory
      - ./internal/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d latent"]
      interval: 5s
      timeout: 5s
      retries: 5

  latent-coord:
    image: valkey/valkey:8.1-alpine
    container_name: latent-coord
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  latent-storage:
    image: ministackorg/ministack:1.3.36
    container_name: latent-storage
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  latent-storage-init:
    image: amazon/aws-cli
    container_name: latent-storage-init
    depends_on:
      latent-storage:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: /bin/sh
    command: >
      -c "aws --endpoint-url=http://latent-storage:4566 s3 mb s3://artifacts"

  latent:
    build:
      context: .
      dockerfile: Dockerfile.test
      # Keep network: host if you are encountering build-time DNS issues
      network: host
    pull_policy: build
    container_name: latent
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8060:8060"
    depends_on:
      latent-db:
        condition: service_healthy
      latent-coord:
        condition: service_healthy
      latent-storage:
        condition: service_healthy
      latent-storage-init:
        condition: service_completed_successfully
    environment:
      # Application Core Configs matching your viper keys
      - LATENT_SERVER_HOST=0.0.0.0
      - LATENT_SERVER_PORT=8060
      - LATENT_LOGGING_LEVEL=debug

      # Storage Configs
      - LATENT_STORAGE_PROVIDER=s3
      - LATENT_STORAGE_S3_BUCKET=artifacts
      - LATENT_STORAGE_S3_REGION=us-east-1
      - LATENT_STORAGE_S3_ENDPOINT=http://latent-storage:4566
      - LATENT_STORAGE_S3_ACCESS_KEY=test
      - LATENT_STORAGE_S3_SECRET_KEY=test
      - LATENT_STORAGE_S3_FORCE_PATH_STYLE=true

      # Metadata Storage Configs (Postgres)
      - LATENT_METADATA_POSTGRES_HOST=latent-db
      - LATENT_METADATA_POSTGRES_PORT=5432
      - LATENT_METADATA_POSTGRES_NAME=latent
      - LATENT_METADATA_POSTGRES_USER=user
      - LATENT_METADATA_POSTGRES_PASSWORD=pass
      - LATENT_METADATA_POSTGRES_SSL_ENABLED=false

      # Coordinator Configs (Valkey)
      - LATENT_COORDINATOR_VALKEY_ENDPOINTS=latent-coord:6379
